<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Executor Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo">
                <i class="fas fa-robot"></i>
                <span>Executor Dashboard</span>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active" data-page="dashboard">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-item" data-page="players">
                    <i class="fas fa-users"></i>
                    <span>Players</span>
                </a>
                <a href="#" class="nav-item" data-page="commands">
                    <i class="fas fa-terminal"></i>
                    <span>Commands</span>
                </a>
                <a href="#" class="nav-item" data-page="announcements">
                    <i class="fas fa-bullhorn"></i>
                    <span>Announcements</span>
                </a>
                <a href="#" class="nav-item" data-page="settings">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <header class="header">
                <h1>Player Monitor</h1>
                <div class="connection-status">
                    <span class="status-dot"></span>
                    <span id="connectionText">Connected</span>
                </div>
            </header>

            <!-- Players Grid -->
            <div id="playersContainer" class="players-grid">
                <!-- Players will be dynamically inserted here -->
            </div>

            <!-- No Players Message -->
            <div id="noPlayersMessage" class="no-players">
                <i class="fas fa-eye-slash"></i>
                <h2>No Script Execution Detected</h2>
                <p>Waiting for players to execute the script...</p>
            </div>
        </div>
    </div>

    <!-- Player Management Modal -->
    <div id="playerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Player Management</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="player-info-header">
                    <img id="modalPlayerAvatar" src="" alt="Player Avatar" class="player-avatar-large">
                    <div class="player-details">
                        <h3 id="modalPlayerName"></h3>
                        <p>User ID: <span id="modalPlayerUserId"></span></p>
                    </div>
                </div>

                <!-- Live Stats -->
                <div class="live-stats">
                    <h3>Live Stats <span class="live-badge">LIVE</span></h3>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <i class="fas fa-chart-line"></i>
                            <span>FPS: <span id="liveFps">60</span></span>
                        </div>
                        <div class="stat-item">
                            <i class="fas fa-clock"></i>
                            <span>Ping: <span id="livePing">45</span>ms</span>
                        </div>
                        <div class="stat-item">
                            <i class="fas fa-microchip"></i>
                            <span>Memory: <span id="liveMemory">256</span>MB</span>
                        </div>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="action-buttons">
                    <button class="action-btn primary" onclick="joinPlayer()">
                        <i class="fas fa-gamepad"></i> Join Player
                    </button>
                    <button class="action-btn" onclick="toggleLiveChat()">
                        <i class="fas fa-comments"></i> View Live Chat
                    </button>
                    <button class="action-btn" onclick="openAnnouncementModal()">
                        <i class="fas fa-bullhorn"></i> Announcement
                    </button>
                </div>

                <!-- Command Categories -->
                <div class="command-categories">
                    <div class="category-tabs">
                        <button class="category-tab active" onclick="showCategory('admin')">Admin</button>
                        <button class="category-tab" onclick="showCategory('player')">Player</button>
                        <button class="category-tab" onclick="showCategory('world')">World</button>
                        <button class="category-tab" onclick="showCategory('fun')">Fun</button>
                    </div>

                    <div id="commandsContainer" class="commands-grid">
                        <!-- Commands will be dynamically inserted here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Live Chat Floating Window -->
    <div id="liveChatWindow" class="floating-window" style="display: none;">
        <div class="window-header">
            <span>Live Chat</span>
            <button onclick="closeLiveChat()">&times;</button>
        </div>
        <div class="window-body">
            <div id="chatMessages" class="chat-messages"></div>
            <div class="chat-input">
                <input type="text" id="chatMessageInput" placeholder="Type a message...">
                <button onclick="sendChatMessage()">Send</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
